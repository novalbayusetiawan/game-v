packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@capacitor/android": ^8.2.0
  "@capacitor/cli": ^8.2.0
  "@capacitor/core": ^8.2.0
  "@capacitor/ios": ^8.2.0
  "@tresjs/core": ^5.7.0
  "@types/node": ^24
  "@types/three": ^0.183.1
  "@vueuse/core": ^14.2.1
  three: ^0.183.2
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
